version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: crud_postgres
    restart: always

    environment:
      POSTGRES_DB: crud_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin

    ports:
      - "15432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: